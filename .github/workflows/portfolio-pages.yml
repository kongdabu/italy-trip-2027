# 포트폴리오 대시보드를 GitHub Pages로 자동 배포
name: Deploy Portfolio Dashboard

on:
  push:
    branches: [main]
    paths:
      - "portfolio-dashboard/**"
      - ".github/workflows/portfolio-pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# 동시 배포 충돌 방지(진행 중 배포는 취소하지 않음)
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: 체크아웃
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Pages 설정
        uses: actions/configure-pages@983d626a19e0bc1847d813901b4a434b0b26f316 # v5.0.0

      - name: 아티팩트 업로드 (대시보드 폴더)
        uses: actions/upload-pages-artifact@56afc609e74202658d3ffba0e8f6dda996908656 # v3.0.1
        with:
          path: portfolio-dashboard

      - name: Pages 배포
        id: deployment
        uses: actions/deploy-pages@d6db90164db5e11df2916c8ecf8c44e5f76de69e # v4.0.5
