    * { box-sizing:border-box; margin:0; padding:0; }
    body { background:var(--bg); color:var(--txt);

    h3 { font-size:1rem; margin-bottom:10px; color:var(--txt); }
    .muted { color:var(--sub); font-size:.85rem; }
    .warn { background:#2a210a; border:1px solid #6b5311; color:#ffd43b;
            padding:10px 14px; border-radius:10px; font-size:.82rem; margin:12px 0; }
    .grid { display:grid; gap:12px; }
    .cards { grid-template-columns:repeat(auto-fit,minmax(165px,1fr)); margin-top:14px; }
    .charts { grid-template-columns:repeat(auto-fit,minmax(290px,1fr)); margin-top:16px; }
    .card { background:var(--card); border:1px solid var(--line);
            border-radius:14px; padding:16px; }
    .kpi-label { color:var(--sub); font-size:.8rem; margin-bottom:6px; }
    .kpi { font-size:1.45rem; font-weight:700; }
    .kpi-sub { font-size:.82rem; margin-top:4px; }
    .up { color:var(--up); } .down { color:var(--down); }
    .tabs { display:flex; gap:8px; flex-wrap:wrap; margin:22px 0 14px; }
    .tab { padding:8px 16px; border-radius:999px; background:var(--card);
           border:1px solid var(--line); cursor:pointer; font-size:.9rem; color:var(--txt); }
    .tab.active { background:var(--accent); border-color:var(--accent); font-weight:600; }
    .acct-summary { display:flex; gap:18px; flex-wrap:wrap; margin-bottom:6px; font-size:.9rem; }
    .acct-note { color:var(--sub); font-size:.85rem; margin:8px 0 16px; }
    .holding { margin-bottom:12px; }
    .h-head { display:flex; justify-content:space-between; align-items:baseline; flex-wrap:wrap; gap:6px; }
    .h-name { font-size:1.02rem; font-weight:600; }
    .h-meta { color:var(--sub); font-size:.78rem; }
    .h-pnl { font-size:1rem; font-weight:700; text-align:right; }
    .h-body { display:grid; grid-template-columns:1.4fr 1fr; gap:14px; margin-top:10px; align-items:center; }
    @media(max-width:640px){ .h-body{ grid-template-columns:1fr; } }
    .row { display:flex; justify-content:space-between; font-size:.82rem; padding:3px 0;
           border-bottom:1px dashed var(--line); }
    .opinion { display:inline-block; font-size:.74rem; padding:2px 9px; border-radius:6px;
               background:#1f2733; border:1px solid var(--line); margin-left:6px; }
    .op-buy{ color:#69db7c; } .op-cut{ color:#ffa94d; } .op-sell{ color:#ff8787; } .op-hold{ color:#74c0fc; }
    .comment { font-size:.82rem; color:#c3c8ce; margin-top:8px; }
    .badge { display:inline-block; font-size:.7rem; padding:2px 8px; border-radius:6px;
             background:#332701; color:#ffd43b; margin:2px 4px 0 0; }
    .radar-wrap { max-width:230px; margin:0 auto; }
    canvas { max-height:300px; }
    table { width:100%; border-collapse:collapse; font-size:.82rem; margin-top:6px; }
    th,td { padding:7px 8px; border-bottom:1px solid var(--line); text-align:right; }
    th:first-child,td:first-child { text-align:left; }
    footer { margin-top:34px; color:var(--sub); font-size:.78rem;

    const won = n => n==null ? "-" : "₩" + Math.round(n).toLocaleString("ko-KR");
    const pct = n => n==null ? "-" : (n>=0?"+":"") + Number(n).toFixed(2) + "%";
    const cls = n => n>=0 ? "up" : "down";
    const PALETTE = ["#3b5bdb","#1c7ed6","#0ca678","#f59f00","#e8590c","#e03131",
                     "#ae3ec9","#7048e8","#1098ad","#74b816","#f06595","#868e96"];
    const baseOpts = { plugins:{ legend:{ labels:{ color:"#c3c8ce", font:{ size:11 } }, position:"bottom" } },
                       maintainAspectRatio:true };

    // ── 메타 / KPI ───────────────────────────────
    document.getElementById("asOf").textContent =
      `기준일: ${DATA.meta.asOf} · 통화: ${DATA.meta.currency} · 5관점(${DATA.meta.perspectives.join("·")})`;
    document.getElementById("caution").textContent = "ⓘ " + DATA.meta.dataCaution;

    const s = DATA.summary;
    const kpiHtml = [
      { l:"총 평가금액", v:won(s.totalValue), sub:`매입 ${won(s.totalBuy)}`, c:"" },
      { l:"총 평가손익", v:won(s.totalPnl), sub:pct(s.totalPnlPct), c:cls(s.totalPnl) },
      { l:"보유 계좌", v:`${DATA.accounts.length}개`, sub:"일반·연금·ISA", c:"" },
      { l:"보유 종목", v:`${DATA.accounts.reduce((a,x)=>a+x.holdings.length,0)}개`, sub:"중복 포함", c:"" },
    ].map(k=>`<div class="card"><div class="kpi-label">${k.l}</div>
        <div class="kpi ${k.c}">${k.v}</div><div class="kpi-sub ${k.c}">${k.sub}</div></div>`).join("");
    document.getElementById("kpis").innerHTML = kpiHtml;

    document.getElementById("risks").innerHTML = s.topRisks.map(r=>`<li>${r}</li>`).join("");
    document.getElementById("actions").innerHTML = s.topActions.map(a=>`<li>${a}</li>`).join("");

    // ── 도넛 차트 (자산군/지역/섹터) ───────────────
    function donut(id, arr){
      new Chart(document.getElementById(id), {
        type:"doughnut",
        data:{ labels:arr.map(x=>`${x.name} ${x.pct}%`),
               datasets:[{ data:arr.map(x=>x.value),
                           backgroundColor:PALETTE, borderColor:"#1a1d24", borderWidth:2 }] },
        options:baseOpts
      });
    }
    donut("assetChart", DATA.allocation.byAssetClass);
    donut("regionChart", DATA.allocation.byRegion);
    donut("sectorChart", DATA.allocation.bySector);

    // ── 계좌별 손익 막대 ──────────────────────────
    new Chart(document.getElementById("acctChart"), {
      type:"bar",
      data:{ labels:DATA.accounts.map(a=>`${a.name} (${pct(a.pnlPct)})`),
             datasets:[{ label:"평가손익(원)", data:DATA.accounts.map(a=>a.pnl),
               backgroundColor:DATA.accounts.map(a=>a.pnl>=0?"#e03131":"#1c7ed6") }] },
      options:{ ...baseOpts, plugins:{ legend:{ display:false } },
        scales:{ y:{ ticks:{ color:"#9aa0a6", callback:v=>(v/10000).toLocaleString()+"만" } },
                 x:{ ticks:{ color:"#c3c8ce" } } } }
    });

    // ── 계좌 탭 + 종목 카드 ───────────────────────
    const opClass = o => o.includes("매도")?"op-sell" : o.includes("축소")?"op-cut" :
                         o.includes("매수")||o.includes("확대")?"op-buy" : "op-hold";
    const tabsEl = document.getElementById("tabs");
    const viewEl = document.getElementById("accountView");

    function renderAccount(idx){
      [...tabsEl.children].forEach((t,i)=>t.classList.toggle("active", i===idx));
      const a = DATA.accounts[idx];
      let html = `<div class="card">
        <div class="acct-summary">
          <span>평가금액 <b>${won(a.value)}</b></span>
          <span>매입금액 ${won(a.buy)}</span>
          <span class="${cls(a.pnl)}">손익 <b>${won(a.pnl)} (${pct(a.pnlPct)})</b></span>
        </div>
        <div class="acct-note">${a.note}</div>`;

      a.holdings.forEach((h,hi)=>{
        const cid = `radar_${idx}_${hi}`;
        const flags = (h.flags||[]).map(f=>`<span class="badge">${f}</span>`).join("");
        html += `<div class="holding card" style="background:#15181f">
          <div class="h-head">
            <div><span class="h-name">${h.ticker}</span>
              <span class="opinion ${opClass(h.opinion)}">${h.opinion}</span>
              <div class="h-meta">${h.sector} · ${h.region} · ${h.assetClass} · ${h.qty}주</div></div>
            <div class="h-pnl ${cls(h.pnl)}">${won(h.pnl)}<br><span style="font-size:.82rem">${pct(h.pnlPct)}</span></div>
          </div>
          <div class="h-body">
            <div>
              <div class="row"><span>현재가</span><span>${won(h.price)}</span></div>
              <div class="row"><span>매입단가</span><span>${won(h.avgPrice)}</span></div>
              <div class="row"><span>평가금액</span><span>${won(h.value)}</span></div>
              <div class="comment">${h.comment}</div>
              <div>${flags}</div>
            </div>
            <div class="radar-wrap"><canvas id="${cid}"></canvas></div>
          </div></div>`;
      });
      html += `</div>`;
      viewEl.innerHTML = html;

      // 종목별 5관점 레이더
      a.holdings.forEach((h,hi)=>{
        const sc = h.scores;
        new Chart(document.getElementById(`radar_${idx}_${hi}`), {
          type:"radar",
          data:{ labels:["펀더","기술","섹터","거시","심리"],
                 datasets:[{ data:[sc.fundamental,sc.technical,sc.sector,sc.macro,sc.sentiment],
                   backgroundColor:"rgba(59,91,219,0.25)", borderColor:"#3b5bdb",
                   pointBackgroundColor:"#74c0fc" }] },
          options:{ plugins:{ legend:{ display:false } },
            scales:{ r:{ min:0, max:5, ticks:{ display:false, stepSize:1 },
              grid:{ color:"#2a2e37" }, angleLines:{ color:"#2a2e37" },
              pointLabels:{ color:"#9aa0a6", font:{ size:10 } } } } }
        });
      });
    }

    DATA.accounts.forEach((a,i)=>{
      const t = document.createElement("div");
      t.className = "tab" + (i===0?" active":"");
      t.textContent = `${a.name} (${pct(a.pnlPct)})`;
      t.onclick = ()=>renderAccount(i);
      tabsEl.appendChild(t);
    });
    renderAccount(0);

    document.getElementById("genStamp").textContent = `대시보드 생성: ${DATA.meta.asOf} · portfolio-analyzer 하네스`;
  </script>
</body>
</html>
